name: Continuous Accessibility Review

on:
  schedule:
    # Run on the 19th of each month at 2 AM UTC
    - cron: '0 2 19 * *'
  workflow_dispatch: # Allow manual triggers
    inputs:
      notify:
        description: 'Send notifications'
        required: false
        default: 'true'
  pull_request:
    paths:
      - 'src/**'
      - 'public/**'
      - 'tests/**'
      - 'accessibility-review-config.json'

jobs:
  accessibility-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Accessibility Review Agent
        id: review
        continue-on-error: true
        run: |
          npm run accessibility-review
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Accessibility Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report-${{ github.run_number }}
          path: reports/accessibility/
          retention-days: 90

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'reports/accessibility/pr-summary.md';
            
            if (fs.existsSync(reportPath)) {
              const summary = fs.readFileSync(reportPath, 'utf8');
              
              // Find existing comment
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              
              const botComment = comments.find(comment => 
                comment.user.type === 'Bot' && 
                comment.body.includes('🎭 Accessibility Review Results')
              );
              
              if (botComment) {
                // Update existing comment
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: summary
                });
              } else {
                // Create new comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: summary
                });
              }
            }

      - name: Check for regressions
        if: always()
        id: check-regressions
        run: |
          if [ -f reports/accessibility/regression-issue.md ]; then
            echo "regressions_found=true" >> $GITHUB_OUTPUT
          else
            echo "regressions_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Issue for Regressions
        if: steps.check-regressions.outputs.regressions_found == 'true' && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issueBody = fs.readFileSync('reports/accessibility/regression-issue.md', 'utf8');
            
            // Check for existing open regression issue from today
            const today = new Date().toISOString().split('T')[0];
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'accessibility,regression',
              per_page: 10
            });
            
            const existingIssue = issues.find(issue => 
              issue.title.includes(today)
            );
            
            if (existingIssue) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `## 🔄 Updated Regression Report\n\n${issueBody}\n\n---\n*Updated at ${new Date().toISOString()}*`
              });
              console.log(`Updated existing issue #${existingIssue.number}`);
            } else {
              // Create new issue
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔴 Accessibility Regression - ${today}`,
                body: issueBody,
                labels: ['accessibility', 'regression', 'high-priority', 'automated']
              });
              console.log(`Created new issue #${newIssue.number}`);
            }

      - name: Fail workflow if regressions detected
        if: steps.review.outcome == 'failure'
        run: |
          echo "❌ Accessibility review failed - regressions detected"
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "## 🎭 Accessibility Review Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f reports/accessibility/report.json ]; then
            echo "✅ Review completed successfully" >> $GITHUB_STEP_SUMMARY
            
            # Extract summary from JSON
            PAGES=$(jq -r '.summary.totalPages' reports/accessibility/report.json)
            REGRESSIONS=$(jq -r '.summary.regressions' reports/accessibility/report.json)
            ERRORS=$(jq -r '.summary.errors' reports/accessibility/report.json)
            AVG_SCORE=$(jq -r '.summary.averageScore' reports/accessibility/report.json)
            
            echo "- **Pages Reviewed:** $PAGES" >> $GITHUB_STEP_SUMMARY
            echo "- **Regressions:** $REGRESSIONS" >> $GITHUB_STEP_SUMMARY
            echo "- **Errors:** $ERRORS" >> $GITHUB_STEP_SUMMARY
            echo "- **Average Score:** $AVG_SCORE/100" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📊 [View Detailed Report](../../../actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Review report not generated" >> $GITHUB_STEP_SUMMARY
          fi
